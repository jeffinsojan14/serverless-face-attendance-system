<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Registration</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./register.css">

</head>

<body>

<div class="container">

    <h1>Employee Registration</h1>

    <!-- Employee ID -->
    <input type="text"
           id="employeeId"
           placeholder="Employee ID">

    <!-- Employee Name -->
    <input type="text"
           id="employeeName"
           placeholder="Employee Name">

    <!-- Employee Image Upload -->
    <input type="file"
           id="employeeImage"
           accept="image/*">

    <!-- Register Button -->
    <button id="registerBtn">
        Register Employee
    </button>

    <!-- Status Message -->
    <p id="status"></p>

</div>

<!-- JavaScript -->
<script src="./register.js"></script>

</body>

</html>
